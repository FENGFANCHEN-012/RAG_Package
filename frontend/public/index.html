<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Assistant</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 LLM Assistant</h1>
            <p class="subtitle">基于 RAG 的智能问答系统</p>
            <p style="margin-top: 8px;">
                <a href="/upload" class="quick-btn" style="text-decoration:none;">打开 Vector Store 上传页</a>
            </p>
        </header>

        <main>
            <!-- Settings Panel -->
            <div class="settings-panel">
               
                    <label for="query-type">查询类型:</label>
                    <select id="query-type">
                        <option value="rag">资料搜索</option>
                    </select>
                
            </div>

            <!-- Chat Container -->
            <div class="chat-container" id="chat-container">
                <div class="welcome-message">
                    <h2>👋 欢迎使用 LLM Assistant</h2>
                    <p>请输入您的问题，我会尽力为您解答。</p>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="setQuickQuestion('阿司匹林的主要作用是什么？')">
                            💊 阿司匹林的作用
                        </button>
                        <button class="quick-btn" onclick="setQuickQuestion('什么是机器学习？')">
                            🤖 机器学习介绍
                        </button>
                        <button class="quick-btn" onclick="setQuickQuestion('如何预防感冒？')">
                            🤧 感冒预防
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="user-input" 
                        placeholder="输入您的问题..." 
                        rows="2"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button id="send-btn" onclick="sendMessage()">
                        <span class="send-icon">➤</span>
                    </button>
                </div>
                <div class="input-hints">
                    <span>按 Enter 发送，Shift+Enter 换行</span>
                    <span id="status" class="status"></span>
                </div>
            </div>

        </main>

        <footer>
            <p>Powered by Ollama & Node.js</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
